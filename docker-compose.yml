services:
  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ../5.18
    environment:
      MYSQLHOST: db
      MYSQLPORT: 3306
      MYSQLDATABASE: sipal
      MYSQLUSER: sipaluser
      MYSQLPASSWORD: Sipal@2026!
      PORT: 8081
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sipal
      MYSQL_USER: sipaluser
      MYSQL_PASSWORD: Sipal@2026!
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
